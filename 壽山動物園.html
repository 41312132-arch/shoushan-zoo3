        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0d1a0a 0%, #030803 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px rgba(255, 255, 255, 0.08) solid;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px rgba(255, 255, 255, 0.04) solid;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
            border: 1px rgba(255, 255, 255, 0.15) solid;
        }
        .zone-entrance-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .scrollbar-hidden::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hidden {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ------------------ 高級生態背景波浪動畫 (CSS Pulse Fallback) ------------------ */
        @keyframes junglePulse {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .jungle-bg-pulse {
            background: linear-gradient(270deg, #0d1a0a, #163510, #041203, #0d1a0a);
            background-size: 800% 800%;
            animation: junglePulse 15s ease infinite;
        }

        /* ------------------ 高級漂浮動畫定義 ------------------ */
        @keyframes gentleFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        
        .floating-btn {
            animation: gentleFloat 4s ease-in-out infinite;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        background-color 0.3s ease, 
                        border-color 0.3s ease, 
                        box-shadow 0.3s ease;
        }

        /* 當鼠標懸停在整個圖釘組上時，暫停上下漂動以便精準點擊，並加入微放大的磁吸效果 */
        .group-pin:hover .floating-btn {
            animation-play-state: paused;
            transform: scale(1.08) translateY(-3px);
        }

        // ------------------ ✨ GEMINI API UTILITIES & RETRY ------------------
        async function callGeminiAPI(userPrompt, systemInstructionText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: { parts: [{ text: systemInstructionText }] }
            };

            const fetchOptions = {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            };

            const maxRetries = 5;
            let currentDelay = 1000;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    const response = await fetch(url, fetchOptions);
                    if (!response.ok) {
                        throw new Error(`HTTP status ${response.status}`);
                    }
                    const data = await response.json();
                    const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (textResult) {
                        return textResult;
                    }
                    throw new Error("Empty response parts");
                } catch (err) {
                    if (attempt === maxRetries) {
                        throw new Error("無法連線至智慧助理。請檢查網路狀態或 API 金鑰配置。");
                    }
                    await new Promise(resolve => setTimeout(resolve, currentDelay));
                    currentDelay *= 2; 
                }
            }
        }

        function playAnimalTTS(zoneId, animalIndex) {
            const zone = zooData.find(z => z.id === zoneId);
            if (zone) {
                const animal = zone.animals[animalIndex];

                    speakText(animal.name.split(' ')[0], animal.ttsText);
                }
            }

        function speakText(name, text) {
            stopVoice(); 

            if ('speechSynthesis' in window) {
                const player = document.getElementById('global-audio-player');
                const title = document.getElementById('player-title');
                const progressBar = document.getElementById('player-progress');
                
                title.textContent = `${name} 導覽中...`;
                player.classList.remove('translate-y-24', 'opacity-0');

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.95; 

                let start = Date.now();
                let estimatedDuration = text.length * 280; 
                
                progressBar.style.width = '0%';
                progressInterval = setInterval(() => {
                    let elapsed = Date.now() - start;
                    let percentage = Math.min((elapsed / estimatedDuration) * 100, 98);
                    progressBar.style.width = `${percentage}%`;
                }, 100);

                utterance.onend = () => {
                    progressBar.style.width = '100%';
                    setTimeout(stopVoice, 800);
                };

                utterance.onerror = () => {
                    stopVoice();
                };

                currentAudio = utterance;
                window.speechSynthesis.speak(utterance);
            } else {
                const feedback = document.getElementById('calibrated-coords');
                if (feedback) {
                    feedback.textContent = "您的瀏覽器不支援 Speech API 播音，以下為導覽文本：" + text;
                }
            }
        }

            const icon = btn.querySelector('i');
            if (video.muted) {
                icon.className = 'fa-solid fa-volume-xmark text-xs md:text-sm';
                btn.title = "取消靜音";
                btn.classList.remove('border-green-400/50');
            } else {
                icon.className = 'fa-solid fa-volume-high text-xs md:text-sm text-green-400 animate-pulse';
                btn.title = "設定靜音";
                btn.classList.add('border-green-400/50');
            }
        }

        function toggleBannerVideoPlay(btn) {
            const video = document.getElementById('hero-banner-video');
            if (!video) return;
            const icon = btn.querySelector('i');
            if (video.paused) {
                video.play();
                icon.className = 'fa-solid fa-pause text-xs md:text-sm';
                btn.title = "暫停播放";
                btn.classList.remove('border-green-400/50');
            } else {
                video.pause();
                icon.className = 'fa-solid fa-play text-xs md:text-sm text-green-400';
                btn.title = "繼續播放";
                btn.classList.add('border-green-400/50');
            }
        }

        function switchTab(tabId) {
            stopVoice(); 
            renderZoo(tabId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = function() {
            renderZoo('home');
        };
    </script>
</body>
</html>
